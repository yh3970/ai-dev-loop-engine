# Reusable AI development loop workflow.
name: AI Dev Loop

on:
  workflow_call:
    inputs:
      issue_number:
        description: Issue number to implement.
        required: true
        type: string
      trigger_comment:
        description: Comment text that triggered the loop.
        required: false
        type: string
        default: ""
      base_branch:
        description: Branch to create the AI work branch from.
        required: false
        type: string
        default: main
      branch_prefix:
        description: Prefix for the fixed issue branch.
        required: false
        type: string
        default: ai/issue-
      engine_repository:
        description: Repository that contains reusable prompts and workflow assets.
        required: false
        type: string
        default: yh3970/ai-dev-loop-engine
      engine_ref:
        description: Git ref to checkout from the engine repository.
        required: false
        type: string
        default: main
      provider:
        description: LLM provider. Supported values are openai and volcengine.
        required: false
        type: string
        default: openai
      model:
        description: LLM model or provider endpoint ID used for planning and review.
        required: false
        type: string
        default: gpt-4.1-mini
      volcengine_base_url:
        description: Volcengine Ark API base URL.
        required: false
        type: string
        default: https://ark.cn-beijing.volces.com/api/v3
      install_command:
        description: Optional dependency installation command to run before implementation.
        required: false
        type: string
        default: ""
      test_command:
        description: Optional test command to run after each Codex implementation attempt.
        required: false
        type: string
        default: ""
      working_directory:
        description: Directory where install and test commands should run.
        required: false
        type: string
        default: .
      max_iterations:
        description: Maximum review/fix iterations for a single workflow run.
        required: false
        type: number
        default: 3
    secrets:
      OPENAI_API_KEY:
        required: false
      ARK_API_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: aidev-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  ai-dev-loop:
    name: Plan, code, review, and update PR
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      TRIGGER_COMMENT: ${{ inputs.trigger_comment }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      BRANCH_PREFIX: ${{ inputs.branch_prefix }}
      MAX_ITERATIONS: ${{ inputs.max_iterations }}
      INSTALL_COMMAND: ${{ inputs.install_command }}
      TEST_COMMAND: ${{ inputs.test_command }}
      WORKING_DIRECTORY: ${{ inputs.working_directory }}
      PROVIDER: ${{ inputs.provider }}
      MODEL: ${{ inputs.model }}
      VOLCENGINE_BASE_URL: ${{ inputs.volcengine_base_url }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      ENGINE_DIR: _ai_dev_loop_engine
    steps:
      - name: Init runtime env
        shell: bash
        run: |
          echo "RUNTIME_DIR=$RUNNER_TEMP/ai-dev-loop-runtime" >> "$GITHUB_ENV"

      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Checkout engine prompts
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.engine_repository }}
          ref: ${{ inputs.engine_ref }}
          path: ${{ env.ENGINE_DIR }}
          token: ${{ github.token }}

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare fixed issue branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          branch="${BRANCH_PREFIX}${ISSUE_NUMBER}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

          git fetch origin "${BASE_BRANCH}" --prune
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            git fetch origin "${branch}"
            git checkout -B "${branch}" "origin/${branch}"
          else
            git checkout -B "${branch}" "origin/${BASE_BRANCH}"
            git push -u origin "${branch}"
          fi

      - name: Install runtime dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          npm install -g @openai/codex

      - name: Run project install command
        if: inputs.install_command != ''
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.install_command }}

      - name: Read issue context
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number(process.env.ISSUE_NUMBER);
            const {owner, repo} = context.repo;
            const issue = await github.rest.issues.get({owner, repo, issue_number});
            core.setOutput("title", issue.data.title || "");
            core.setOutput("body", issue.data.body || "");

      - name: Create helper scripts
        shell: bash
        run: |
          mkdir -p "$RUNTIME_DIR"
          cat > "$RUNTIME_DIR/llm_call.py" <<'PY'
          import json
          import os
          import random
          import sys
          import time

          import requests

          provider = (os.environ.get("PROVIDER") or "openai").strip().lower()
          model = (os.environ.get("MODEL") or "").strip()
          prompt_path, input_path, output_path = sys.argv[1:4]

          with open(prompt_path, "r", encoding="utf-8") as f:
              system_prompt = f.read()
          with open(input_path, "r", encoding="utf-8") as f:
              user_input = f.read()

          retry_statuses = {429, 500, 502, 503, 504}
          backoff_seconds = [10, 20, 40, 80, 120]
          max_attempts = 5

          def post_with_retry(url, headers, payload):
              response = None
              for attempt in range(1, max_attempts + 1):
                  response = requests.post(url, headers=headers, json=payload, timeout=180)
                  if response.status_code not in retry_statuses:
                      response.raise_for_status()
                      return response

                  if attempt >= max_attempts:
                      print(
                          f"LLM API failed after {max_attempts} attempts with "
                          f"status {response.status_code}: {response.text[:500]}",
                          file=sys.stderr,
                      )
                      response.raise_for_status()

                  retry_after = response.headers.get("Retry-After")
                  if retry_after:
                      try:
                          wait_seconds = float(retry_after)
                      except ValueError:
                          wait_seconds = backoff_seconds[attempt - 1]
                  else:
                      wait_seconds = backoff_seconds[attempt - 1]
                  wait_seconds += random.uniform(0, 2)

                  print(
                      f"LLM API returned {response.status_code}; retrying in "
                      f"{wait_seconds:.1f}s, attempt {attempt + 1}/{max_attempts}",
                      file=sys.stderr,
                  )
                  time.sleep(wait_seconds)
              raise RuntimeError("No LLM response was received")

          def extract_responses_text(data):
              text = data.get("output_text")
              if text:
                  return str(text)
              parts = []
              for item in data.get("output", []):
                  for content in item.get("content", []):
                      if isinstance(content, dict) and content.get("type") in ("output_text", "text"):
                          parts.append(str(content.get("text", "")))
              return "\n".join(parts).strip()

          def call_openai():
              api_key = os.environ.get("OPENAI_API_KEY")
              if not api_key:
                  raise RuntimeError("OPENAI_API_KEY is required when provider=openai")
              openai_model = model or "gpt-4.1-mini"
              payload = {
                  "model": openai_model,
                  "input": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_input},
                  ],
              }
              if output_path.endswith(".json"):
                  payload["text"] = {"format": {"type": "json_object"}}

              response = post_with_retry(
                  "https://api.openai.com/v1/responses",
                  {
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                  },
                  payload,
              )
              return extract_responses_text(response.json()) or ""

          def call_volcengine():
              api_key = os.environ.get("ARK_API_KEY")
              if not api_key:
                  raise RuntimeError("ARK_API_KEY is required when provider=volcengine")
              ark_model = model or "doubao-seed-evolving"
              base_url = (os.environ.get("VOLCENGINE_BASE_URL") or "https://ark.cn-beijing.volces.com/api/v3").rstrip("/")
              combined_input = (
                  "System instructions:\n"
                  + system_prompt
                  + "\n\nUser request:\n"
                  + user_input
              )
              if output_path.endswith(".json"):
                  combined_input += (
                      "\n\nReturn only one valid JSON object. Do not include markdown fences, comments, or extra text."
                  )

              payload = {
                  "model": ark_model,
                  "input": [
                      {
                          "role": "user",
                          "content": [
                              {"type": "input_text", "text": combined_input},
                          ],
                      }
                  ],
              }
              response = post_with_retry(
                  f"{base_url}/responses",
                  {
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                  },
                  payload,
              )
              data = response.json()
              text = extract_responses_text(data)
              if text:
                  return text
              choices = data.get("choices") or []
              if choices:
                  message = choices[0].get("message") or {}
                  content = message.get("content", "")
                  if isinstance(content, list):
                      return "\n".join(str(item.get("text") or item.get("content") or item) for item in content).strip()
                  return str(content).strip()
              raise RuntimeError(f"Volcengine response did not contain text: {json.dumps(data)[:500]}")

          if provider == "openai":
              text = call_openai()
          elif provider in ("volcengine", "ark", "doubao"):
              text = call_volcengine()
          else:
              raise RuntimeError(f"Unsupported provider: {provider}. Supported: openai, volcengine")

          with open(output_path, "w", encoding="utf-8") as f:
              f.write(text or "")
          PY

      - name: Generate initial plan
        shell: bash
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail
          cat > "$RUNTIME_DIR/planner-input.md" <<EOF
          # Issue

          Number: ${ISSUE_NUMBER}

          Title:
          ${ISSUE_TITLE}

          Body:
          ${ISSUE_BODY}

          Trigger comment:
          ${TRIGGER_COMMENT}
          EOF
          plan_dir=".ai-dev/issue-${ISSUE_NUMBER}"
          mkdir -p "$plan_dir"
          python "$RUNTIME_DIR/llm_call.py" \
            "$ENGINE_DIR/.github/ai/prompts/planner.md" \
            "$RUNTIME_DIR/planner-input.md" \
            "$plan_dir/plan.md"

      - name: Commit plan
        shell: bash
        run: |
          set -euo pipefail
          git add ".ai-dev/issue-${ISSUE_NUMBER}/plan.md"
          if git diff --cached --quiet; then
            echo "No plan changes to commit."
          else
            git commit -m "Add AI implementation plan for issue #${ISSUE_NUMBER}"
            git push origin "${{ steps.branch.outputs.branch }}"
          fi

      - name: Create or update pull request
        id: pr
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = `${owner}:${process.env.BRANCH_NAME}`;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
            });

            const title = `AI dev loop for issue #${process.env.ISSUE_NUMBER}`;
            const body = [
              `Automated implementation branch for #${process.env.ISSUE_NUMBER}.`,
              "",
              "This PR is continuously updated for the same issue branch.",
              "",
              `Plan: \`.ai-dev/issue-${process.env.ISSUE_NUMBER}/plan.md\``,
              "",
              "Auto-merge is intentionally disabled; human review is required before merge.",
            ].join("\n");

            let pr;
            if (pulls.data.length > 0) {
              pr = pulls.data[0];
              await github.rest.pulls.update({owner, repo, pull_number: pr.number, title, body});
            } else {
              pr = (await github.rest.pulls.create({
                owner,
                repo,
                title,
                body,
                head: process.env.BRANCH_NAME,
                base: process.env.BASE_BRANCH,
                maintainer_can_modify: true,
              })).data;
            }
            core.setOutput("number", String(pr.number));
            core.setOutput("html_url", pr.html_url);

      - name: Run implementation and review loop
        shell: bash
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          max="${MAX_ITERATIONS:-3}"
          if [ "$max" -lt 1 ]; then
            max=1
          fi

          for iteration in $(seq 1 "$max"); do
            echo "Starting iteration ${iteration}/${max}"

            plan_path=".ai-dev/issue-${ISSUE_NUMBER}/plan.md"
            {
              cat "$ENGINE_DIR/.github/ai/prompts/coder.md"
              printf '\n# Current plan path\n%s\n' "$plan_path"
              printf '\n# Working directory for project commands\n%s\n' "$WORKING_DIRECTORY"
              cat "$plan_path"
            } > "$RUNTIME_DIR/coder-instructions.md"
            codex exec --full-auto --dangerously-bypass-approvals-and-sandbox \
              "$(cat "$RUNTIME_DIR/coder-instructions.md")"

            git status | tee "$RUNTIME_DIR/git-status.txt"

            if [ -n "${TEST_COMMAND}" ]; then
              set +e
              (cd "$WORKING_DIRECTORY" && bash -lc "$TEST_COMMAND") 2>&1 | tee "$RUNTIME_DIR/test-result.txt"
              test_exit=${PIPESTATUS[0]}
              set -e
              echo "test_exit=${test_exit}" >> "$RUNTIME_DIR/test-result.txt"
            else
              echo "No test_command configured." | tee "$RUNTIME_DIR/test-result.txt"
              test_exit=0
            fi

            if [ -n "$(git status --porcelain --untracked-files=all -- . ":(exclude)$ENGINE_DIR")" ]; then
              git add -A -- . ":(exclude)$ENGINE_DIR"
              git commit -m "Apply AI plan for issue #${ISSUE_NUMBER} (iteration ${iteration})"
              git push origin "${BRANCH_NAME}"
            else
              echo "Codex produced no working tree changes."
            fi

            git fetch origin "${BASE_BRANCH}" --prune
            git diff --name-only "origin/${BASE_BRANCH}...HEAD" > "$RUNTIME_DIR/changed-files.txt"
            git diff --find-renames "origin/${BASE_BRANCH}...HEAD" > "$RUNTIME_DIR/diff.patch"

            cat > "$RUNTIME_DIR/reviewer-input.md" <<EOF
          # plan.md

          $(cat ".ai-dev/issue-${ISSUE_NUMBER}/plan.md")

          # Changed files

          $(cat "$RUNTIME_DIR/changed-files.txt")

          # Git diff

          $(cat "$RUNTIME_DIR/diff.patch")

          # Test result

          $(cat "$RUNTIME_DIR/test-result.txt")
          EOF

            python "$RUNTIME_DIR/llm_call.py" \
              "$ENGINE_DIR/.github/ai/prompts/reviewer.md" \
              "$RUNTIME_DIR/reviewer-input.md" \
              "$RUNTIME_DIR/review.json"

            python -m json.tool "$RUNTIME_DIR/review.json" > "$RUNTIME_DIR/review.pretty.json"
            cat "$RUNTIME_DIR/review.pretty.json"

            status="$(python - <<'PY'
          import json
          import os
          with open(os.path.join(os.environ["RUNTIME_DIR"], "review.json"), "r", encoding="utf-8") as f:
              print(json.load(f).get("status", "needs_changes"))
          PY
          )"

            if [ "$status" = "pass" ]; then
              echo "Review passed."
              break
            fi

            if [ "$iteration" -ge "$max" ]; then
              echo "Review still needs changes after ${max} iterations."
              exit 1
            fi

            cat > "$RUNTIME_DIR/replan-input.md" <<EOF
          # Previous plan.md

          $(cat ".ai-dev/issue-${ISSUE_NUMBER}/plan.md")

          # Reviewer JSON

          $(cat "$RUNTIME_DIR/review.pretty.json")

          Generate a revised plan.md that keeps the original issue scope and fixes only the reviewer findings.
          EOF

            python "$RUNTIME_DIR/llm_call.py" \
              "$ENGINE_DIR/.github/ai/prompts/planner.md" \
              "$RUNTIME_DIR/replan-input.md" \
              ".ai-dev/issue-${ISSUE_NUMBER}/plan.md"

            git add ".ai-dev/issue-${ISSUE_NUMBER}/plan.md"
            if git diff --cached --quiet; then
              echo "No revised plan changes to commit."
            else
              git commit -m "Revise AI plan for issue #${ISSUE_NUMBER} (iteration ${iteration})"
              git push origin "${BRANCH_NAME}"
            fi
          done

      - name: Comment with PR result
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.html_url }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const {owner, repo} = context.repo;
            const body = [
              `AI dev loop finished with status: ${process.env.JOB_STATUS}.`,
              "",
              `PR: ${process.env.PR_URL || `#${process.env.PR_NUMBER}`}`,
              "",
              "No automatic merge was attempted.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body,
            });
