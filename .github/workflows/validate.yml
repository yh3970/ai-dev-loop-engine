name: Validate Workflows

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate workflow files and docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML and repository invariants
        shell: bash
        run: |
          set -euo pipefail

          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path); puts "parsed #{path}" }' \
            .github/workflows/ai-dev-loop.yml \
            .github/workflows/validate.yml

          python - <<'PY'
          from pathlib import Path
          import sys

          bidi_chars = {
              "\u061c", "\u200e", "\u200f", "\u202a", "\u202b", "\u202c",
              "\u202d", "\u202e", "\u2066", "\u2067", "\u2068", "\u2069",
          }

          paths = [
              Path(".github/workflows/ai-dev-loop.yml"),
              Path(".github/workflows/validate.yml"),
              Path("README.md"),
              Path(".github/ai/prompts/planner.md"),
              Path(".github/ai/prompts/coder.md"),
              Path(".github/ai/prompts/reviewer.md"),
          ]

          for path in paths:
              data = path.read_bytes()
              if b"\r" in data:
                  raise SystemExit(f"CRLF or CR line ending found in {path}")
              text = data.decode("utf-8")
              for line_number, line in enumerate(text.splitlines(), start=1):
                  for char in line:
                      if char in bidi_chars:
                          raise SystemExit(f"Hidden bidi Unicode character U+{ord(char):04X} in {path}:{line_number}")

          workflow = Path(".github/workflows/ai-dev-loop.yml").read_text(encoding="utf-8")
          if "runner.temp" in workflow:
              raise SystemExit("Do not use runner.temp in ai-dev-loop job env; use RUNNER_TEMP in Init runtime env step")
          if "RUNTIME_DIR=$RUNNER_TEMP/ai-dev-loop-runtime" not in workflow:
              raise SystemExit("Missing required RUNTIME_DIR initialization via RUNNER_TEMP")

          readme = Path("README.md").read_text(encoding="utf-8")
          expected = "yh3970/ai-dev-loop-engine/.github/workflows/ai-dev-loop.yml@main"
          if expected not in readme:
              raise SystemExit(f"README reusable workflow example must include {expected}")

          print("repository validation passed")
          PY
